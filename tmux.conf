set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Show pane numbers
set-option -g pane-border-status top
set-option -g pane-border-format " #P "

# Automatically renumber windows when one is closed
set -g renumber-windows on

# Set active pane border color
set -g pane-active-border-style fg=cyan
# Use a heavier line for the active pane
set -g pane-border-lines heavy

# Set the foreground/background color for the active window
set -g window-active-style fg=colour231,bg=default
# Set the foreground/background color for all other windows
set -g window-style fg=colour240,bg=default
